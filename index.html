<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime-Site</title>
</head>

<body>
  <div id="root"></div>
  <!---- Toggle Switch Container ---->
<div class="flex items-center space-x-2 ml-auto">
  <span class="text-sm text-gray-600 dark:text-gray-300">Theme</span>

  <!----Switch---->
  <label for="theme-toggle" class="relative inline-flex items-center cursor-pointer">
    <input type="checkbox" id="theme-toggle" class="sr-only peer" />
    <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:bg-indigo-600 transition-colors duration-300"></div>
    <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-all duration-300 peer-checked:translate-x-full peer-checked:bg-white"></div>
  </label>
</div>

  <script type="module" src="/src/main.jsx"></script>
  <script src="index.js"></script>
</body>

</html>
